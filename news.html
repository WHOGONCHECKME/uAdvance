<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>uAdvance — News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Variables ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f0e;
    --bg2:       #161614;
    --bg3:       #1e1e1b;
    --bg4:       #252521;
    --line:      #2e2e2a;
    --line2:     #3a3a35;
    --text:      #e8e6df;
    --muted:     #888780;
    --faint:     #555450;
    --accent:    #c8a96e;
    --accent2:   #e8c98a;
    --serif: "Times New Roman", Times, serif;
    --sans:  'DM Sans', sans-serif;
    --sidebar: 360px;
    --chat-h: 320px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-size: 14px;
  }

  /* ── Top bar ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    background: var(--bg);
  }
  .logo {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--accent);
    letter-spacing: -0.3px;
    white-space: nowrap;
  }
  .logo span { color: var(--muted); font-style: italic; }
  .header-meta {
    font-size: 12px;
    color: var(--faint);
    margin-left: auto;
  }
  #article-count { color: var(--accent); font-weight: 500; }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar);
    flex-shrink: 0;
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    background: var(--bg2);
  }

  .filters {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .filter-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .filter-row:last-child { margin-bottom: 0; }

  .filter-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--faint);
    width: 44px;
    flex-shrink: 0;
  }
  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .chip {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--line2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--faint); color: var(--text); }
  .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,0.08); }

  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 10px 7px 32px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--faint); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--faint);
    font-size: 13px;
    pointer-events: none;
  }

  /* ── Article list ── */
  .article-list {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    padding: 6px 0;
  }
  .article-list::-webkit-scrollbar { width: 4px; }
  .article-list::-webkit-scrollbar-track { background: transparent; }
  .article-list::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

  .article-card {
    padding: 13px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.12s;
    position: relative;
  }
  .article-card:hover { background: var(--bg3); }
  .article-card.active { background: var(--bg3); }
  .article-card.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }
  .heading-pill {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: rgba(200,169,110,0.08);
    color: var(--accent);
    border: 1px solid rgba(200,169,110,0.22);
  }

  .card-date {
    font-size: 11px;
    color: var(--faint);
    margin-left: auto;
  }
  .card-title {
    font-family: var(--serif);
    font-size: 14.5px;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 5px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary {
    font-size: 12px;
    line-height: 1.5;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--faint);
    font-size: 13px;
  }

  /* ── Main panel ── */
  .main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  .article-view {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    padding: 0 48px 24px;
  }
  .article-view::-webkit-scrollbar { width: 4px; }
  .article-view::-webkit-scrollbar-track { background: transparent; }
  .article-view::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

  /* Placeholder state */
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--faint);
  }
  .placeholder-icon { font-size: 32px; opacity: 0.4; }
  .placeholder p { font-size: 14px; }

  /* Article content */
  .article-title-wrap { 
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 36px 0 16px;
    margin-bottom: 0;
    border-bottom: 1px solid var(--line);
  }
  
  .article-pub-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .article-publication {
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .article-date { font-size: 12px; color: var(--faint); }
  .article-title {
    font-family: var(--serif);
    font-size: 28px;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 0;
    font-weight: 400;
  }
    .article-sticky-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
    font-size: 12px;
    color: var(--faint);
  }
  .article-sticky-meta span:not(:last-child)::after {
    content: '•';
    margin-left: 10px;
    color: var(--faint);
  }
  .article-sticky-summary {
    margin-top: 12px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--muted);
    max-width: 780px;
  }
  .article-divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 24px 0;
  }
  .article-body {
    font-size: 15px;
    line-height: 1.75;
    padding: 15px 200px 15px 50px;
    max-width: 800px;
    color: var(--text);
    white-space: pre-wrap;
    text-align: justify;
    word-break: break-word;
  }
  .article-source-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid rgba(200,169,110,0.3);
    padding: 6px 12px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .article-source-link:hover { background: rgba(200,169,110,0.08); }

  /* ── Chat panel ── */
  .chat-panel {
    border-top: 1px solid var(--line);
    background: var(--bg2);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    transition: height 0.2s ease;
  }
  .chat-panel.collapsed { height: 63px; overflow: hidden; }
  .chat-panel:not(.collapsed) { height: var(--chat-h); }

  .chat-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    height: 63px;
    cursor: pointer;
    flex-shrink: 0;
    border-bottom: 1px solid var(--line);
    user-select: none;
    transition: background 0.12s;
  }
  .chat-toggle:hover { background: var(--bg3); }
  .chat-toggle-label {
    font-size: 18px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .chat-chevron {
    font-size: 13px;
    color: var(--faint);
    transition: transform 0.2s;
    margin-left: auto;
  }
  .chat-panel:not(.collapsed) .chat-chevron { transform: rotate(180deg); }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
  }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

  .msg {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.5;
  }
  .msg-user {
    background: rgba(200,169,110,0.12);
    color: var(--text);
    align-self: flex-end;
    border: 1px solid rgba(200,169,110,0.2);
  }
  .msg-ai {
    background: var(--bg3);
    color: var(--muted);
    align-self: flex-start;
    border: 1px solid var(--line);
  }
  .msg-thinking {
    color: var(--faint);
    font-style: italic;
    font-size: 12px;
    align-self: flex-start;
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--line);
    flex-shrink: 0;
    align-items: flex-end;
  }
  .chat-context-note {
    font-size: 10px;
    color: var(--faint);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .chat-input-wrap { flex: 1; display: flex; flex-direction: column; }
  .chat-input {
    background: var(--bg3);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--sans);
    outline: none;
    resize: none;
    min-height: 38px;
    max-height: 100px;
    transition: border-color 0.15s;
    line-height: 1.4;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--faint); }

  .chat-send {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    white-space: nowrap;
    height: 38px;
  }
  .chat-send:hover { background: var(--accent2); }
  .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }


  /* ── Loading spinner ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--line2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Scrollbar global ── */
  * { scrollbar-width: thin; scrollbar-color: var(--line2) transparent; }
</style>
</head>
<body>


<header>
  <div class="logo">uAdvance <span>/ news</span></div>
  <div class="header-meta"><span id="article-count">0</span> articles loaded</div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="filters">
      <div class="filter-row">
        <div class="filter-label">Search</div>
        <div class="search-wrap" style="flex:1">
          <span class="search-icon">⌕</span>
          <input type="text" id="search-input" placeholder="Search titles, summaries…">
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-label">Heading</div>
        <div class="filter-chips" id="heading-chips"></div>
      </div>
      <div class="filter-row">
        <div class="filter-label">Sort</div>
        <div class="filter-chips">
          <button class="chip active" data-sort="date-desc" onclick="setSort(this)">Newest</button>
          <button class="chip" data-sort="date-asc" onclick="setSort(this)">Oldest</button>
          <button class="chip" data-sort="alpha" onclick="setSort(this)">A–Z</button>
        </div>
      </div>
    </div>
    <div class="article-list" id="article-list"></div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="article-view" id="article-view">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">◈</div>
        <p>Select an article to read</p>
      </div>
      <div id="article-content" style="display:none"></div>
    </div>

    <!-- Chat -->
    <div class="chat-panel collapsed" id="chat-panel">
      <div class="chat-toggle" onclick="toggleChat()">
        <span style="font-size:26px">◇</span>
        <span class="chat-toggle-label">Ask NewsAI</span>
        <span class="chat-chevron">▲</span>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="msg msg-ai">Hi! Ask me anything about the articles you're reading. I'll use the current article as context when you have one open.</div>
      </div>
      <div class="chat-input-row">
        <div class="chat-input-wrap">
          <div class="chat-context-note" id="chat-context-note">No article selected — ask general questions</div>
          <textarea class="chat-input" id="chat-input" placeholder="Ask a question…" rows="1" onkeydown="handleChatKey(event)"></textarea>
        </div>
        <button class="chat-send" id="chat-send" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allArticles = [];
let filteredArticles = [];
let activeHeading = 'All';
let activeSort = 'date-desc';
let selectedArticle = null;
let openaiKey = sessionStorage.getItem('oai_key') || '';

// -- Debounce
const debouncedApplyFilters = debounce(applyFilters, 200);

// ── Debounce ───────────────────────────────────────────────────────────────
function debounce(fn, delay = 200) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), delay);
  };
}
// ── Boot ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('articles_index.json');
    if (!res.ok) throw new Error('not found');
    allArticles = await res.json();
  } catch {
    // Dev fallback: use sample data so the page is usable without the file
    allArticles = getSampleArticles();
  }

  document.getElementById('article-count').textContent = allArticles.length;
  buildHeadingChips();
  applyFilters();
}

// ── Filters ────────────────────────────────────────────────────────────────
function buildHeadingChips() {
  const headings = ['All', ...new Set(allArticles.map(a => (a.heading || '').trim()).filter(Boolean))];
  const wrap = document.getElementById('heading-chips');
  wrap.innerHTML = headings.map(h => {
  const c = h === 'All' ? null : headingColor(h);
  const style = c ? `style="background:${c.bg};color:${c.text};border-color:${c.border}"` : '';
  return `<button class="chip${h === 'All' ? ' active' : ''}" ${style} onclick="setHeading(this,'${escapeForOnclick(h)}')">${escapeHtml(h)}</button>`;
}).join('');
}

function setHeading(el, heading) {
  document.querySelectorAll('#heading-chips .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeHeading = heading;
  applyFilters();
}

function setSort(el) {
  document.querySelectorAll('[data-sort]').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeSort = el.dataset.sort;
  applyFilters();
}

document.getElementById('search-input').addEventListener('input', debounce(applyFilters));

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  let list = [...allArticles];

  if (activeHeading !== 'All') list = list.filter(a => (a.heading || '').trim() === activeHeading);
  if (q) list = list.filter(a =>
    (a.title || '').toLowerCase().includes(q) ||
    (a.summary || '').toLowerCase().includes(q) ||
    (a.publication || '').toLowerCase().includes(q) ||
    (a.heading || '').toLowerCase().includes(q) ||
    (a.full_text || '').toLowerCase().includes(q)
    );

  if (activeSort === 'date-desc') list.sort((a,b) => (b.published_date||b.scraped_at||'').localeCompare(a.published_date||a.scraped_at||''));
  else if (activeSort === 'date-asc') list.sort((a,b) => (a.published_date||a.scraped_at||'').localeCompare(b.published_date||b.scraped_at||''));
  else if (activeSort === 'alpha') list.sort((a,b) => (a.title||'').localeCompare(b.title||''));

  filteredArticles = list;
  document.getElementById('article-count').textContent = filteredArticles.length;
  renderList();
}

function headingColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  const h = Math.abs(hash) % 360;
  return {
    bg: `hsl(${h}, 30%, 15%)`,
    text: `hsl(${h}, 70%, 70%)`,
    border: `hsl(${h}, 40%, 25%)`
  };
}

// ── Render list ────────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('article-list');
  if (!filteredArticles.length) {
    el.innerHTML = '<div class="empty-state">No articles match your filters.</div>';
    return;
  }
  el.innerHTML = filteredArticles.map((a, i) => {
    const heading = (a.heading || '').trim();
    const hc = heading ? headingColor(heading) : null;
    const date = formatDate(a.published_date);
    const isActive = selectedArticle && selectedArticle.id === a.id ? ' active' : '';
    return `<div class="article-card${isActive}" onclick="selectArticle('${a.id}')">
      <div class="card-meta">
        ${hc ? `<span class="heading-pill" style="background:${hc.bg};color:${hc.text};border:1px solid ${hc.border}">${escapeHtml(heading)}</span>` : ''}
        <span class="card-date">${date}</span>
      </div>
      <div class="card-title">${escapeHtml(a.title || 'Untitled')}</div>
      ${a.summary ? `<div class="card-summary">${escapeHtml(a.summary)}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Select article ─────────────────────────────────────────────────────────
async function selectArticle(id) {
  const article = filteredArticles.find(a => a.id === id);
  if (!article) return;
  selectedArticle = article;
  renderList(); // refresh active state

  // Load full text from individual JSON file
  let fullText = article.full_text || '';
  if (!fullText && article.filename) {
    try {
      const res = await fetch(`articles/${article.filename}`);
      if (res.ok) {
        const data = await res.json();
        fullText = data.full_text || '';
        selectedArticle = { ...article, full_text: fullText };
      }
    } catch {}
  }

  renderArticle(selectedArticle, fullText);
  updateChatContext(selectedArticle);
}

function renderArticle(a, fullText) {
  document.getElementById('placeholder').style.display = 'none';
  const el = document.getElementById('article-content');
  el.style.display = 'block';

  const date = formatDate(a.published_date);
  const author = cleanAuthor(a.author);
  const wordCount = a.word_count ? `${Number(a.word_count).toLocaleString()} words` : '';
  const summary = a.summary || '';
  const metaParts = [
    a.publication,
    date,
    author ? `By ${author}` : '',
    wordCount
  ].filter(Boolean).map(x => `<span>${escapeHtml(x)}</span>`).join('');
  const sourceLink = a.final_url
    ? `<a class="article-source-link" href="${a.final_url}" target="_blank">↗ View original source</a>`
    : a.factiva_url
    ? `<a class="article-source-link" href="${a.factiva_url}" target="_blank">↗ View on Factiva</a>`
    : '';

  el.innerHTML = `
    <div class="article-title-wrap">
      <h1 class="article-title">${escapeHtml(a.title || 'Untitled')}</h1>
      ${metaParts ? `<div class="article-sticky-meta">${metaParts}</div>` : ''}
      ${summary ? `<div class="article-sticky-summary">${escapeHtml(summary)}</div>` : ''}
    </div>
    <div class="article-body">${fullText ? escapeHtml(fullText) : '<em style="color:var(--faint)">Full text not available. View the original source below.</em>'}</div>
    <div style="margin-top:24px">${sourceLink}</div>
  `;

  // Scroll article view to top
  document.getElementById('article-view').scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Chat ───────────────────────────────────────────────────────────────────
function toggleChat() {
  document.getElementById('chat-panel').classList.toggle('collapsed');
}

function updateChatContext(article) {
  const note = document.getElementById('chat-context-note');
  note.textContent = article
    ? `Context: "${article.title.slice(0,50)}${article.title.length > 50 ? '…' : ''}"`
    : 'No article selected — ask general questions';
}

let chatHistory = [];

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage(msg, 'user');

  const btn = document.getElementById('chat-send');
  btn.disabled = true;
  addMessage('<span class="spinner"></span>Thinking…', 'thinking');

  let system = `You are a helpful research assistant for uAdvance, an Australian professional development platform for actuaries and financial services professionals. Answer clearly and concisely.`;
  if (selectedArticle) {
    const ctx = [
      selectedArticle.title && `Title: ${selectedArticle.title}`,
      selectedArticle.publication && `Publication: ${selectedArticle.publication}`,
      selectedArticle.published_date && `Date: ${selectedArticle.published_date}`,
      selectedArticle.summary && `Summary: ${selectedArticle.summary}`,
      selectedArticle.full_text && `Article text (first 3000 chars):\n${(selectedArticle.full_text || '').slice(0, 3000)}`,
    ].filter(Boolean).join('\n');
    system += `\n\nThe user is currently reading this article:\n${ctx}`;
  }

  chatHistory.push({ role: 'user', content: msg });

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${openaiKey}` },
      body: JSON.stringify({
        model: 'gpt-4o',
        max_tokens: 600,
        messages: [
          { role: 'system', content: system },
          ...chatHistory
        ]
      })
    });
    const data = await res.json();
    removeThinking();
    if (data.error) throw new Error(data.error.message);
    const reply = data.choices[0].message.content;
    chatHistory.push({ role: 'assistant', content: reply });
    addMessage(reply, 'ai');
  } catch(err) {
    chatHistory.pop(); // remove the user message if the request failed
    removeThinking();
    addMessage(`Error: ${err.message}`, 'ai');
  }
  btn.disabled = false;
}

function addMessage(text, type) {
  const wrap = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg msg-${type}`;
  div.innerHTML = text;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeThinking() {
  const el = document.querySelector('.msg-thinking');
  if (el) el.remove();
}


// ── Helpers ────────────────────────────────────────────────────────────────

function formatDate(d) {
  if (!d) return '';
  try {
    return new Date(d).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
  } catch { return d; }
}

function cleanAuthor(author) {
  if (!author) return '';
  const value = String(author).trim();

  if (value.startsWith('http://') || value.startsWith('https://')) return '';

  return value
    .replace(/^by\s+/i, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function escapeForOnclick(str) {
  return String(str)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/"/g, '&quot;');
}
