<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>uAdvance — News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Variables ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
/* Test comment */
  :root {
    --bg:        #0f0f0e;
    --bg2:       #161614;
    --bg3:       #1e1e1b;
    --bg4:       #252521;
    --line:      #2e2e2a;
    --line2:     #3a3a35;
    --text:      #e8e6df;
    --muted:     #888780;
    --faint:     #555450;
    --accent:    #c8a96e;
    --accent2:   #e8c98a;
    --serif: "Times New Roman", Times, serif;
    --sans:  'DM Sans', sans-serif;
    --sidebar: 360px;
    --chat-h: 320px;
    --chat-rail-w: 320px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh; /* mobile: accounts for address bar show/hide */
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-size: 14px;
  }

  /* ── Top bar ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    background: var(--bg);
  }
  .logo {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--accent);
    letter-spacing: -0.3px;
    white-space: nowrap;
  }
  .logo span { color: var(--muted); font-style: italic; }
  .header-meta {
    font-size: 12px;
    color: var(--faint);
    margin-left: auto;
  }
  /* ── Ticker ── */
.ticker-wrap {
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  overscroll-behavior-x: contain;
  mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
  -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
  scrollbar-width: none;
}
.ticker-wrap::-webkit-scrollbar { display: none; }
.ticker {
  display: flex;
  gap: 0;
  white-space: nowrap;
  width: max-content;
  animation: ticker-scroll 1000s linear infinite;
}
.ticker:hover { animation-play-state: paused; }
.ticker-item {
  font-size: 14px;
  color: var(--accent);
  padding: 0 28px;
  cursor: pointer;
  transition: color 0.15s;
  flex-shrink: 0;
}
.ticker-item:hover { color: var(--accent); }

@keyframes ticker-scroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
  #article-count { color: var(--accent); font-weight: 500; }

  /* ── Layout ── */
  .layout {
    display: block;
    min-height: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg2);
  }

    .sidebar-resizer {
    width: 0px;
    flex-shrink: 0;
    cursor: col-resize;
    background: var(--bg2);
    border-left: 1px solid var(--line);
    border-right: 3px solid var(--line);
    touch-action: none;
    transition: background 0.12s;
  }
  .sidebar-resizer:hover,
  body.resizing-sidebar .sidebar-resizer {
    background: var(--bg3);
  }
  body.resizing-sidebar {
    cursor: col-resize;
    user-select: none;
  }

  .filters {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .filter-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .filter-row:last-child { margin-bottom: 0; }

  .filter-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--faint);
    width: 44px;
    flex-shrink: 0;
  }
  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .chip {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--line2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--faint); color: var(--text); }
  .chip.active { border-color: var(--accent); color: var(--bg); background: var(--accent); font-weight: 500; }
  .chip.inactive { color: var(--faint); border-color: var(--line); opacity: 0.5; }
  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--faint); }
  
  .date-filter-wrap {
    display: flex;
    gap: 6px;
    flex: 1;
  }
  .date-filter-wrap input {
    min-width: 0;
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 8px;
    color: var(--text);
    font-size: 12px;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.15s;
  }
  .date-filter-wrap input:focus { border-color: var(--accent); }
  .date-filter-wrap input::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }

  /* ── Article list ── */
  .article-list {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    padding: 6px 0;
  }
  .article-list::-webkit-scrollbar { width: 4px; }
  .article-list::-webkit-scrollbar-track { background: transparent; }
  .article-list::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

  .article-card {
    padding: 13px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.12s;
    position: relative;
  }
  .article-card:hover { background: var(--bg3); }
  .article-card.active { background: var(--bg3); }
  .article-card.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }
  .heading-pill {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: rgba(200,169,110,0.08);
    color: var(--accent);
    border: 1px solid rgba(200,169,110,0.22);
  }

  .card-date {
    font-size: 11px;
    color: var(--faint);
    margin-left: auto;
  }
  .card-title {
    font-family: var(--serif);
    font-size: 14.5px;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 5px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary {
    font-size: 12px;
    line-height: 1.5;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--faint);
    font-size: 13px;
  }

  /* ── Main panel ── */
  .main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  .article-view {
    flex: 1;
    overflow-y: auto;
/*    overscroll-behavior: contain;*/
    -webkit-overflow-scrolling: touch;
    padding: 0 48px 24px;
  }
  .article-view::-webkit-scrollbar { width: 4px; }
  .article-view::-webkit-scrollbar-track { background: transparent; }
  .article-view::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

  /* Placeholder state */
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--faint);
  }
  .placeholder-icon { font-size: 32px; opacity: 0.4; }
  .placeholder p { font-size: 14px; }

  /* Article content */
  .article-title-wrap { 
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 36px 0 16px;
    margin-bottom: 0;
    border-bottom: 1px solid var(--line);
  }
  
  .article-pub-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .article-publication {
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .article-date { font-size: 12px; color: var(--faint); }
  .article-title {
    font-family: var(--serif);
    font-size: 28px;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 0;
    font-weight: 400;
  }
    .article-sticky-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
    font-size: 12px;
    color: var(--faint);
  }
  .article-sticky-meta span:not(:last-child)::after {
    content: '•';
    margin-left: 10px;
    color: var(--faint);
  }
  .article-sticky-summary {
    margin-top: 12px;
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    max-width: 780px;
  }
  .article-divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 24px 0;
  }
  .article-body {
    font-size: 15px;
    line-height: 1.75;
    padding: 15px 24px;
    max-width: none;
    color: var(--muted);
    white-space: pre-wrap;
    text-align: justify;
    word-break: break-word;
  }
  .article-source-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid rgba(200,169,110,0.3);
    padding: 6px 12px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .article-source-link:hover { background: rgba(200,169,110,0.08); }

  /* ── Chat panel ── */
  .chat-panel {
    border-top: 1px solid var(--line);
    background: var(--bg2);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: height 0.2s ease;
  }
  .chat-panel.collapsed { height: 63px; overflow: hidden; }
  .chat-panel:not(.collapsed) { height: var(--chat-h); }
  .chat-resizer { display: none; }

  .chat-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    height: 63px;
    cursor: pointer;
    flex-shrink: 0;
    border-bottom: 1px solid var(--line);
    user-select: none;
    transition: background 0.12s;
  }
  .chat-toggle:hover { background: var(--bg3); }
  .chat-toggle-label {
    font-size: 18px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .chat-chevron {
    font-size: 13px;
    color: var(--faint);
    transition: transform 0.2s;
    margin-left: auto;
  }
  .chat-panel:not(.collapsed) .chat-chevron { transform: rotate(180deg); }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
  }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

  .msg {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.5;
  }
  .msg-user {
    background: rgba(200,169,110,0.12);
    color: var(--text);
    align-self: flex-end;
    border: 1px solid rgba(200,169,110,0.2);
  }
  .msg-ai {
    background: var(--bg3);
    color: var(--muted);
    align-self: flex-start;
    border: 1px solid var(--line);
  }
  .msg-thinking {
    color: var(--faint);
    font-style: italic;
    font-size: 12px;
    align-self: flex-start;
  }

  .chat-input-row {
    min-width: 0;
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--line);
    flex-shrink: 0;
    align-items: flex-end;
  }
  .chat-context-note {
    font-size: 10px;
    color: var(--faint);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .chat-input-wrap { 
  flex: 1; 
  min-width: 0;
  display: flex; 
  flex-direction: column; }
  .chat-input {
    background: var(--bg3);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--sans);
    outline: none;
    resize: none;
    min-height: 38px;
    max-height: 100px;
    transition: border-color 0.15s;
    width: 100%;
    box-sizing: border-box;
    line-height: 1.4;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--faint); }
  .chat-send {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    flex-shrink: 0;
    font-size: 13px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    white-space: nowrap;
    height: 38px;
  }
  .chat-send:hover { background: var(--accent2); }
  .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Loading spinner ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--line2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .pane-focused { 
    outline: 1px solid var(--muted); 
    outline-offset: -1px; 
  }
/* ── Password Gate ── */
#password-gate {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
#password-gate.hidden { display: none; }
.gate-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 300px;
}
.gate-logo {
  font-family: var(--serif);
  font-size: 28px;
  color: var(--accent);
  letter-spacing: -0.3px;
}
.gate-logo span { color: var(--muted); font-style: italic; }
.gate-box input[type="password"] {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--line2);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s;
}
.gate-box input[type="password"]:focus { border-color: var(--accent); }
.gate-box button {
  width: 100%;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  padding: 10px;
  cursor: pointer;
  transition: background 0.15s;
}
.gate-box button:hover { background: var(--accent2); }
.gate-error {
  font-size: 12px;
  color: #c0614a;
  min-height: 16px;
}
  /* ── Mobile nav bar (hidden on desktop) ── */
  .mobile-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    background: var(--bg);
  }
  .mobile-back {
    background: transparent;
    border: 1px solid var(--line2);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 12px;
    font-family: var(--sans);
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .mobile-back:hover { border-color: var(--accent); color: var(--accent); }
  .mobile-bar-title {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Mobile (≤768px) ──────────────────────────────────────────────
     Each panel becomes a full-screen VIEW; we switch between them via
     body[data-mview]. Chat is a separate full-screen overlay driven by
     the existing .collapsed toggle. Treating chat as a peer view here
     means a future desktop right-rail needs ZERO mobile rework.
     All rules live inside this query, so desktop layout is untouched. */
  @media (max-width: 768px) {
    body {
      font-size: 15px;
      height: auto;
      min-height: 100dvh;
      overflow: visible;
      display: block;
      scroll-behavior: smooth;
    }

    /* Header: reclaim horizontal space */
    header { padding: 0 14px; gap: 10px; position: sticky; top: 0; z-index: 120; }
    .logo { font-size: 17px; }
    .header-meta { display: none; }

    /* Single column; drop the desktop-only resizer */
    .sidebar-resizer { display: none; }
    .sidebar { width: 100%; display: block; min-width: 0; }
    .main { width: 100%; display: block;}

    /* Show exactly one panel at a time */
    body[data-mview="article"] .sidebar { display: none; }
    body[data-mview="list"]    .main    { display: none; }

    .filters { 
      padding: 12px 14px;
    }
    .article-list { padding-bottom: 72px; overflow: visible; } /* clear the chat launcher */

    /* Back bar appears whenever the reader (main) is visible */
    .mobile-bar { display: flex; position: sticky; top: 52px; z-index: 110; }

    /* Reader spacing — kill the 200px right padding from desktop */
    .article-view { padding: 0 16px 88px; overflow: visible; }
    .article-title-wrap { padding: 18px 0 12px; position: static;}
    .article-title { font-size: 22px; }
    .article-sticky-summary { font-size: 14px; }
    .article-body {
      padding: 14px 0 8px;
      max-width: none;
      text-align: left;
      font-size: 15px;
    }

    /* Chat → full-screen overlay launched from a pinned bottom bar */
    .chat-panel {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 200;
      border-top: 1px solid var(--line);
    }
    .chat-panel.collapsed { height: 56px; }
    .chat-panel:not(.collapsed) { top: 0; height: 100dvh; }
    .chat-toggle { height: 56px; }
    .msg { max-width: 92%; }

    /* iOS zooms the page on focus for any input under 16px — prevent it */
    .search-wrap input,
    .date-filter-wrap input,
    .chat-input { font-size: 16px; }
  }

  @media (max-width: 768px) {
    .layout {
      display: block;
    }
    .sidebar,
    .main,
    .article-list,
    .article-view {
      height: auto;
      max-height: none;
      overflow: visible;
      -webkit-overflow-scrolling: auto;
    }
  }


  /* Collapsed tab is desktop-only; hidden by default, shown via min-width query */
  .chat-collapsed-tab { display: none; }

  /* ── Chat right rail (desktop ≥769px) ──────────────────────────────────────
     On mobile the chat-panel stays as a position:fixed bottom overlay (see the
     max-width:768px block above). Everything here is desktop-only.           */
  @media (min-width: 769px) {
    /* Width-based expand/collapse instead of height-based */
    .chat-panel {
      border-top: none;
      border-left: 1px solid var(--line);
      height: auto !important;
      overflow: hidden;
      transition: width 0.25s ease;
      flex-shrink: 0;
    }
    body.resizing-chat .chat-panel { transition: none; }
    .chat-panel.collapsed     { width: 44px; }
    .chat-panel:not(.collapsed) { width: var(--chat-rail-w); }

    .chat-resizer {
      display: block;
      position: absolute;
      top: 0;
      bottom: 0;
      left: -4px;
      width: 8px;
      cursor: col-resize;
      touch-action: none;
      z-index: 2;
      transition: background 0.12s;
    }
    .chat-resizer::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 4px;
      width: 3px;
      background: var(--line);
    }
    .chat-resizer:hover,
    body.resizing-chat .chat-resizer {
      background: var(--bg3);
    }
    .chat-panel.collapsed .chat-resizer { display: none; }
    body.resizing-chat {
      cursor: col-resize;
      user-select: none;
    }

    /* When collapsed: show the vertical tab, hide the main chat UI */
    .chat-panel.collapsed .chat-collapsed-tab { display: flex; }
    .chat-panel.collapsed .chat-toggle,
    .chat-panel.collapsed .chat-messages,
    .chat-panel.collapsed .chat-input-row { display: none; }

    /* Vertical collapsed strip */
    .chat-collapsed-tab {
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 20px;
      gap: 12px;
      height: 100%;
      cursor: pointer;
      transition: background 0.12s;
    }
    .chat-collapsed-tab:hover { background: var(--bg3); }
    .chat-tab-label {
      writing-mode: vertical-rl;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Toggle header in expanded state */
    .chat-toggle {
      height: 52px;
      border-top: none;
      border-bottom: 1px solid var(--line);
    }
    /* Replace the up-arrow with a close × */
    .chat-chevron { font-size: 0; }
    .chat-chevron::before { content: '✕'; font-size: 12px; }
    .chat-panel:not(.collapsed) .chat-chevron { transform: none; }
  }

  /* ── Scrollbar global ── */
  * { scrollbar-width: thin; scrollbar-color: var(--line2) transparent; }
</style>
</head>
<body>

<div id="password-gate">
  <div class="gate-box">
    <div class="gate-logo">uAdvance <span>/ news</span></div>
    <input type="password" id="gate-input" placeholder="Password" autofocus />
    <div class="gate-error" id="gate-error"></div>
    <button onclick="checkPassword()">Enter</button>
  </div>
</div>

<script>
  const CORRECT_PASSWORD = "password"; // ← change this to your password

  function checkPassword() {
    const val = document.getElementById('gate-input').value;
    if (val === CORRECT_PASSWORD) {
      document.getElementById('password-gate').classList.add('hidden');
    } else {
      document.getElementById('gate-error').textContent = 'Incorrect password.';
      document.getElementById('gate-input').value = '';
      document.getElementById('gate-input').focus();
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !document.getElementById('password-gate').classList.contains('hidden')) {
      checkPassword();
    }
  });
</script>

<header>
  <div class="logo">uAdvance <span>/ news</span></div>
  <div class="ticker-wrap">
    <div class="ticker" id="ticker"></div>
  </div>
  <div class="header-meta"><span id="article-count">0</span> articles loaded</div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="filters">
      <div class="filter-row">
        <div class="filter-label">Search</div>
        <div class="search-wrap" style="flex:1">
          <input type="text" id="search-input" placeholder="Search titles, summaries…">
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-label">Industry</div>
        <div class="filter-chips" id="heading-chips"></div>
      </div>
      <div class="filter-row">
        <div class="filter-label">Date</div>
        <div class="date-filter-wrap">
          <input type="date" id="date-from" aria-label="Date from">
          <input type="date" id="date-to" aria-label="Date to">
        </div>
      </div>
    </div>
    <div class="article-list" id="article-list"></div>
  </aside>

  <div class="sidebar-resizer" id="sidebar-resizer" title="Resize article list"></div>

  <!-- Main -->
  <div class="main">
    <div class="mobile-bar" id="mobile-bar">
      <button class="mobile-back" onclick="setMobileView('list')">← Articles</button>
      <span class="mobile-bar-title" id="mobile-bar-title"></span>
    </div>
    <div class="article-view" id="article-view">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">◈</div>
        <p>Select an article to read</p>
      </div>
      <div id="article-content" style="display:none"></div>
    </div>
  </div>

  <!-- Chat rail — sibling of .main so it forms the 3rd column on desktop.
       On mobile it stays a position:fixed bottom overlay (CSS-driven).   -->
  <div class="chat-panel collapsed" id="chat-panel">
    <div class="chat-resizer" id="chat-resizer" title="Resize chat panel"></div>
    <!-- Collapsed tab: visible on desktop only when panel is collapsed -->
    <div class="chat-collapsed-tab" onclick="toggleChat()">
      <span style="font-size:18px;color:var(--accent)">◇</span>
      <span class="chat-tab-label">Ask NewsAI</span>
    </div>
    <!-- Expanded header -->
    <div class="chat-toggle" onclick="toggleChat()">
      <span style="font-size:26px">◇</span>
      <span class="chat-toggle-label">Ask NewsAI</span>
      <span class="chat-chevron">▲</span>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="msg msg-ai">Hi! Ask me anything about the articles you're reading. I'll use the current article as context when you have one open.</div>
    </div>
    <div class="chat-input-row">
      <div class="chat-input-wrap">
        <div class="chat-context-note" id="chat-context-note">No article selected — ask general questions</div>
        <textarea class="chat-input" id="chat-input" placeholder="Ask a question…" rows="1" onkeydown="handleChatKey(event)"></textarea>
      </div>
      <button class="chat-send" id="chat-send" onclick="sendChat()">Send</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allArticles = [];
let filteredArticles = [];
let activeHeadings = new Set();
let selectedArticle = null;
let focusedPane = 'sidebar';
let listScrollY = 0;

// ── Mobile view router ───────────────────────────────────────────────────────
// Chat is treated as a peer full-screen view (its overlay is CSS-driven via the
// existing .collapsed toggle), so moving chat to a desktop right-rail later
// requires no change here.
const mobileMQ = window.matchMedia('(max-width: 768px)');
function isMobile() { return mobileMQ.matches; }
function setMobileView(view) {
  if (!isMobile()) {
    document.body.setAttribute('data-mview', view);
    return;
  }
  if (view === 'article' && document.body.getAttribute('data-mview') === 'list') {
    listScrollY = window.scrollY;
  }
  document.body.setAttribute('data-mview', view);
  if (view === 'list') {
    requestAnimationFrame(() => window.scrollTo(0, listScrollY));
  } else {
    window.scrollTo(0, 0);
  }
}
document.body.setAttribute('data-mview', 'list'); // start on the list (mobile only)

const API_BASE = 'https://uadvance-production.up.railway.app';

// -- Debounce
const debouncedApplyFilters = debounce(applyFilters, 200);

initSidebarResize();
initChatResize();

// ── Sidebar resizing ──────────────────────────────────────────────────────
function initSidebarResize() {
  const resizer = document.getElementById('sidebar-resizer');
  if (!resizer) return;

  const minWidth = 280;
  const maxWidth = 720;

  resizer.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    resizer.setPointerCapture(e.pointerId);
    document.body.classList.add('resizing-sidebar');

    function onPointerMove(e) {
      const nextWidth = Math.min(maxWidth, Math.max(minWidth, e.clientX));
      document.documentElement.style.setProperty('--sidebar', `${nextWidth}px`);
    }

    function onPointerUp(e) {
      document.body.classList.remove('resizing-sidebar');
      resizer.releasePointerCapture(e.pointerId);
      resizer.removeEventListener('pointermove', onPointerMove);
      resizer.removeEventListener('pointerup', onPointerUp);
      resizer.removeEventListener('pointercancel', onPointerUp);
    }

    resizer.addEventListener('pointermove', onPointerMove);
    resizer.addEventListener('pointerup', onPointerUp);
    resizer.addEventListener('pointercancel', onPointerUp);
  });
}

// ── Chat rail resizing ────────────────────────────────────────────────────
function initChatResize() {
  const resizer = document.getElementById('chat-resizer');
  const panel = document.getElementById('chat-panel');
  if (!resizer || !panel) return;

  const minWidth = 280;
  const maxWidth = 720;
  const minArticleWidth = 320;

  resizer.addEventListener('pointerdown', function(e) {
    if (window.matchMedia('(max-width: 768px)').matches || panel.classList.contains('collapsed')) return;

    e.preventDefault();
    resizer.setPointerCapture(e.pointerId);
    document.body.classList.add('resizing-chat');

    function onPointerMove(e) {
      const sidebarWidth = document.querySelector('.sidebar')?.getBoundingClientRect().width || 0;
      const sidebarResizerWidth = document.getElementById('sidebar-resizer')?.getBoundingClientRect().width || 0;
      const availableWidth = window.innerWidth - sidebarWidth - sidebarResizerWidth - minArticleWidth;
      const nextMaxWidth = Math.max(minWidth, Math.min(maxWidth, availableWidth));
      const nextWidth = Math.min(nextMaxWidth, Math.max(minWidth, window.innerWidth - e.clientX));

      document.documentElement.style.setProperty('--chat-rail-w', `${nextWidth}px`);
    }

    function onPointerUp(e) {
      document.body.classList.remove('resizing-chat');
      resizer.releasePointerCapture(e.pointerId);
      resizer.removeEventListener('pointermove', onPointerMove);
      resizer.removeEventListener('pointerup', onPointerUp);
      resizer.removeEventListener('pointercancel', onPointerUp);
    }

    resizer.addEventListener('pointermove', onPointerMove);
    resizer.addEventListener('pointerup', onPointerUp);
    resizer.addEventListener('pointercancel', onPointerUp);
  });
}
// ── Debounce ───────────────────────────────────────────────────────────────
function debounce(fn, delay = 200) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), delay);
  };
}
// ── Boot ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(`${API_BASE}/articles`);
    if (!res.ok) throw new Error(`API error ${res.status}`);
    allArticles = await res.json();
  } catch (err) {
    try {
      const res = await fetch(`articles_index.json?ts=${Date.now()}`);
      if (!res.ok) throw new Error(`Could not load articles_index.json (${res.status})`);
      allArticles = await res.json();
    } catch (err2) {
      console.error(err2);
      allArticles = [];
      document.getElementById('article-count').textContent = '0';
      document.getElementById('article-list').innerHTML =
        '<div class="empty-state">Could not load articles.</div>';
      return;
    }
  }

  document.getElementById('article-count').textContent = allArticles.length;
  buildHeadingChips();
  applyFilters();
  buildTicker();
}

// ── Filters ────────────────────────────────────────────────────────────────
function buildHeadingChips() {
  const headings = ['All', ...new Set(allArticles.map(a => (a.heading || '').trim()).filter(Boolean))];
  const wrap = document.getElementById('heading-chips');
  wrap.innerHTML = headings.map(h => {
    const isAll = h === 'All';
    const isActive = isAll ? activeHeadings.size === 0 : activeHeadings.has(h);
    const c = !isAll && isActive ? headingColor(h) : null;
    const style = c ? `style="background:${c.bg};color:${c.text};border-color:${c.border}"` : '';
    const cls = isActive ? 'active' : '';
    return `<button class="chip ${cls}" ${style} onclick="toggleHeading(this,'${escapeForOnclick(h)}')">${escapeHtml(h)}</button>`;
  }).join('');
}

function buildTicker() {
  const items = allArticles
    .filter(a => a.ticker_line || a.title)
    .map(a => ({ text: a.ticker_line || a.title, id: a.id }));
  if (!items.length) return;

  const ticker = document.getElementById('ticker');
  const html = [...items, ...items]
    .map(item => `<span class="ticker-item" onclick="selectArticleById('${item.id}')">${escapeHtml(item.text)}</span>`)
    .join('');
  ticker.innerHTML = html;
}

function selectArticleById(id) {
  const article = allArticles.find(a => a.id === id);
  if (!article) return;
  selectedArticle = article;
  renderList();
  renderArticle(article, article.full_text || '');
  updateChatContext(article);
  if (isMobile()) {
    document.getElementById('mobile-bar-title').textContent = article.publication || '';
    setMobileView('article');
  }
}

function toggleHeading(el, heading) {
  if (heading === 'All') {
    activeHeadings.clear();
  } else if (activeHeadings.has(heading)) {
    activeHeadings.delete(heading);
  } else {
    activeHeadings.add(heading);
  }
  buildHeadingChips();
  applyFilters();
}

document.getElementById('search-input').addEventListener('input', debounce(applyFilters));
document.getElementById('date-from').addEventListener('change', applyFilters);
document.getElementById('date-to').addEventListener('change', applyFilters);


async function applyFilters() {
  const q = document.getElementById('search-input').value.trim();
  const fromDate = document.getElementById('date-from').value;
  const toDate = document.getElementById('date-to').value;
  let list;

  if (q.length >= 2) { // searching for 2+ chars triggers FTS search; shorter queries filter client-side to avoid overhead
    // Use Railway FTS5 search for full-text queries
    try {
      const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(q)}`);
      if (res.ok) {
        list = await res.json();
      } else {
        throw new Error('Search API failed');
      }
    } catch {
      // Fall back to client-side search
      list = allArticles.filter(a =>
        (a.title || '').toLowerCase().includes(q.toLowerCase()) ||
        (a.summary || '').toLowerCase().includes(q.toLowerCase())
      );
    }
  } else {
    list = [...allArticles];
  }

  if (activeHeadings.size > 0) list = list.filter(a => activeHeadings.has((a.heading || '').trim()));
  if (fromDate) list = list.filter(a => getArticleDateKey(a) >= fromDate);
  if (toDate) list = list.filter(a => getArticleDateKey(a) <= toDate);

  list.sort((a, b) => {
  const dateA = new Date(a.published_date || a.scraped_at || 0);
  const dateB = new Date(b.published_date || b.scraped_at || 0);
  return dateB - dateA;
});
  // When using FTS search, results are already ranked by relevance

  filteredArticles = list;
  document.getElementById('article-count').textContent = filteredArticles.length;
  renderList();
}

function headingColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  const h = Math.abs(hash) % 360;
  return {
    bg: `hsl(${h}, 30%, 15%)`,
    text: `hsl(${h}, 70%, 70%)`,
    border: `hsl(${h}, 40%, 25%)`
  };
}

// ── Render list ────────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('article-list');
  if (!filteredArticles.length) {
    el.innerHTML = '<div class="empty-state">No articles match your filters.</div>';
    return;
  }
  el.innerHTML = filteredArticles.map((a, i) => {
    const heading = (a.heading || '').trim();
    const hc = heading ? headingColor(heading) : null;
    const date = formatDate(a.published_date);
    const isActive = selectedArticle && selectedArticle.id === a.id ? ' active' : '';
    return `<div class="article-card${isActive}" data-article-id="${escapeHtml(a.id)}" onclick="selectArticle('${a.id}')">
      <div class="card-meta">
        ${hc ? `<span class="heading-pill" style="background:${hc.bg};color:${hc.text};border:1px solid ${hc.border}">${escapeHtml(heading)}</span>` : ''}
        <span class="card-date">${date}</span>
      </div>
      <div class="card-title">${escapeHtml(a.title || 'Untitled')}</div>
      ${a.summary ? `<div class="card-summary">${escapeHtml(a.summary)}</div>` : ''}
    </div>`;
  }).join('');
}

function scrollActiveArticleIntoView() {
  if (isMobile()) return; // on mobile we switch to a full-screen article view, so no need to scroll the list
  const list = document.getElementById('article-list');
  const activeCard = list.querySelector('.article-card.active');
  if (!activeCard) return;

  activeCard.scrollIntoView({
    block: 'nearest',
    behavior: 'smooth'
  });
}

// ── Select article ─────────────────────────────────────────────────────────
async function selectArticle(id) {
  const article = filteredArticles.find(a => a.id === id);
  if (!article) return;
  selectedArticle = article;
  renderList();
  scrollActiveArticleIntoView();

  let fullText = article.full_text || '';
  if (!fullText) {
    try {
      const res = await fetch(`${API_BASE}/articles/${encodeURIComponent(id)}`);
      if (res.ok) {
        const data = await res.json();
        fullText = data.full_text || '';
        selectedArticle = { ...article, full_text: fullText };
      }
    } catch {
      if (article.filename) {
        try {
          const res = await fetch(`articles/${article.filename}`);
          if (res.ok) {
            const data = await res.json();
            fullText = data.full_text || '';
            selectedArticle = { ...article, full_text: fullText };
          }
        } catch {}
      }
    }
  }

  renderArticle(selectedArticle, fullText);
  updateChatContext(selectedArticle);
  if (isMobile()) {
    document.getElementById('mobile-bar-title').textContent = selectedArticle.publication || '';
    setMobileView('article');
  }
}

function renderArticle(a, fullText) {
  document.getElementById('placeholder').style.display = 'none';
  const el = document.getElementById('article-content');
  el.style.display = 'block';

  const date = formatDate(a.published_date);
  const author = cleanAuthor(a.author);
  const wordCount = a.word_count ? `${Number(a.word_count).toLocaleString()} words` : '';
  const summary = a.summary || '';
  const metaParts = [
    a.publication,
    date,
    author ? `By ${author}` : '',
    wordCount
  ].filter(Boolean).map(x => `<span>${escapeHtml(x)}</span>`).join('');
  const sourceLink = a.final_url
    ? `<a class="article-source-link" href="${a.final_url}" target="_blank">↗ View original source</a>`
    : a.factiva_url
    ? `<a class="article-source-link" href="${a.factiva_url}" target="_blank">↗ View on Factiva</a>`
    : '';

  el.innerHTML = `
    <div class="article-title-wrap">
      <h1 class="article-title">${escapeHtml(a.title || 'Untitled')}</h1>
      ${metaParts ? `<div class="article-sticky-meta">${metaParts}</div>` : ''}
      ${summary ? `<div class="article-sticky-summary">${escapeHtml(summary)}</div>` : ''}
    </div>
    <div class="article-body">${fullText ? escapeHtml(fullText) : '<em style="color:var(--faint)">Full text not available. View the original source below.</em>'}</div>
    <div style="margin-top:24px">${sourceLink}</div>
  `;

  // Scroll article view to top
  if (!isMobile()) {
    document.getElementById('article-view').scrollTo(0, 0);
  }
}

// ── Chat ───────────────────────────────────────────────────────────────────
function toggleChat() {
  document.getElementById('chat-panel').classList.toggle('collapsed');
}

function handleChatKey(e) {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    sendChat();
  }
}

function updateChatContext(article) {
  const note = document.getElementById('chat-context-note');
  note.textContent = article
    ? `Context: "${article.title.slice(0,50)}${article.title.length > 50 ? '…' : ''}"`
    : 'No article selected — ask general questions';
}

let chatHistory = [];

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage(msg, 'user');

  const btn = document.getElementById('chat-send');
  btn.disabled = true;
  addMessage('<span class="spinner"></span>Thinking…', 'thinking');

  chatHistory.push({ role: 'user', content: msg });

  // Build request body — send article context alongside conversation history
  const body = {
    messages: chatHistory,
    article_title:       selectedArticle?.title       || null,
    article_publication: selectedArticle?.publication || null,
    article_date:        selectedArticle?.published_date || null,
    article_summary:     selectedArticle?.summary     || null,
    article_text:        selectedArticle?.full_text
                           ? selectedArticle.full_text.slice(0, 3000)
                           : null,
  };

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });

    const data = await res.json();
    removeThinking();

    if (!res.ok) throw new Error(data.detail || `Server error ${res.status}`);

    const reply = data.reply;
    chatHistory.push({ role: 'assistant', content: reply });
    addMessage(reply, 'ai');

  } catch (err) {
    chatHistory.pop();
    removeThinking();
    addMessage(`Error: ${err.message}`, 'ai');
  }

  btn.disabled = false;
}

function addMessage(text, type) {
  const wrap = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg msg-${type}`;
  div.innerHTML = text;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeThinking() {
  const el = document.querySelector('.msg-thinking');
  if (el) el.remove();
}


// ── Helpers ────────────────────────────────────────────────────────────────

function formatDate(d) {
  if (!d) return '';
  try {
    return new Date(d).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
  } catch { return d; }
}

function getArticleDateKey(article) {
  const rawDate = article.published_date || article.scraped_at || '';
  if (!rawDate) return '';

  const parsed = new Date(rawDate);
  if (Number.isNaN(parsed.getTime())) return String(rawDate).slice(0, 10);

  return parsed.toISOString().slice(0, 10);
}

function cleanAuthor(author) {
  if (!author) return '';
  const value = String(author).trim();

  if (value.startsWith('http://') || value.startsWith('https://')) return '';

  return value
    .replace(/^by\s+/i, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function escapeForOnclick(str) {
  return String(str)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/"/g, '&quot;');
}

// ── Auto-resize textarea ───────────────────────────────────────────────────
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

function buildTicker() {
  const items = allArticles
    .filter(a => a.ticker_line)
    .map(a => ({ text: a.ticker_line, id: a.id }));
  if (!items.length) return;

  const ticker = document.getElementById('ticker');
  // Duplicate for seamless loop
  const html = [...items, ...items]
    .map(item => `<span class="ticker-item" onclick="selectArticleById('${item.id}')">${escapeHtml(item.text)}</span>`)
    .join('');
  ticker.innerHTML = html;
}

function selectArticleById(id) {
  selectArticle(id);
}

document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    const searchInput = document.getElementById('search-input');
    searchInput.focus();
    searchInput.select();
    return;
  }

  if (e.key === 'Escape' && document.activeElement.id === 'search-input') {
    e.preventDefault();
    document.getElementById('search-input').blur();
    focusedPane = 'sidebar';
    document.getElementById('article-list').classList.add('pane-focused');
    document.getElementById('article-view').classList.remove('pane-focused');
    document.getElementById('chat-panel').classList.remove('pane-focused');
    return;
  }

  // Tab cycles panes
  if (e.key === 'Tab') {
    e.preventDefault();
    const panes = ['sidebar', 'article', 'chat'];
    const next = panes[(panes.indexOf(focusedPane) + 1) % panes.length];
    focusedPane = next;

    // Visually indicate focus
    document.getElementById('article-list').classList.toggle('pane-focused', focusedPane === 'sidebar');
    document.getElementById('article-view').classList.toggle('pane-focused', focusedPane === 'article');
    document.getElementById('chat-panel').classList.toggle('pane-focused', focusedPane === 'chat');
    return;
  }

  // Don't hijack keys when typing in search or chat
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;

  if (focusedPane === 'sidebar') {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      const idx = filteredArticles.findIndex(a => a.id === selectedArticle?.id);
      const next = e.key === 'ArrowDown'
        ? Math.min(idx + 1, filteredArticles.length - 1)
        : Math.max(idx - 1, 0);
      if (filteredArticles[next]) selectArticle(filteredArticles[next].id);
    }
  }

  if (focusedPane === 'article') {
    const view = document.getElementById('article-view');
    if (e.key === 'ArrowDown') view.scrollBy({ top: 80, behavior: 'smooth' });
    if (e.key === 'ArrowUp')   view.scrollBy({ top: -80, behavior: 'smooth' });
  }
});

document.getElementById('article-list').addEventListener('mousedown', () => { focusedPane = 'sidebar'; });
document.getElementById('article-view').addEventListener('mousedown', () => { focusedPane = 'article'; });
document.getElementById('chat-panel').addEventListener('mousedown', () => { focusedPane = 'chat'; });

init();
</script>
</body>
</html>
